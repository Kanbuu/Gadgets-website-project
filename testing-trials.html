<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    *{
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body{
      padding: 5%;
    }
    .main{
      height: 100vh;
      width: 100%;
      background-color: rgb(219, 230, 230);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      
    }

    .left{
      background-color:red;
      /* height: 50%; */
      min-height: 200px;
      border-radius: 20px;
    }
    .right{
      background-color: green;
      display: grid;
      /* grid-template-columns: 1fr 1fr;
       */
       grid-template-rows: auto auto;
       gap: 20px;
    }
    .top{
      background-color: #180808;
      min-height: 200px;
    }
    .bottom{
      background-color: aqua;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .one{
      background-color: brown;
      min-height: 200px;

    }
    .two{
      background-color: purple;
      min-height: 200px;

    }

    @media (max-width:900px) {
      .main{
        grid-template-columns: 1fr;
      }
    }
    @media (max-width:700px) {
      .bottom{
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>


<body>
  <div class="main">
    <div class="left"></div>
    <div class="right">
      <div class="top"></div>
      <div class="bottom">
        <div class="one"></div>
        <div class="two"></div>
      </div>
    </div>
    
  </div>
</body>
</html>
