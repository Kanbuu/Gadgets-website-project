<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
    padding:40px;
}

.products{
    display:grid;

    /* Responsive Grid */
    grid-template-columns:repeat(auto-fit, minmax(250px,1fr));

    gap:25px;
}

.card{
    background:white;
    border-radius:15px;
    padding:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
    transition:.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:10px;
}

.card h3{
    margin:15px 0 10px;
}

.price{
    color:crimson;
    font-size:22px;
    font-weight:bold;
}

button{
    margin-top:15px;
    width:100%;
    padding:12px;
    border:none;
    background:#111;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#333;
}

</style>
</head>
<body>

<div class="products">

    <div class="card">
        <img src="https://picsum.photos/300/300?1">
        <h3>Wireless Headphones</h3>
        <p class="price">$49.99</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://picsum.photos/300/300?2">
        <h3>Gaming Mouse</h3>
        <p class="price">$29.99</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://picsum.photos/300/300?3">
        <h3>Smart Watch</h3>
        <p class="price">$99.99</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://picsum.photos/300/300?4">
        <h3>Bluetooth Speaker</h3>
        <p class="price">$59.99</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://picsum.photos/300/300?5">
        <h3>Keyboard</h3>
        <p class="price">$39.99</p>
        <button>Add to Cart</button>
    </div>

</div>

</body>
</html>
